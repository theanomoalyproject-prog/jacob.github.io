<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:8px;
    color:white;
}

.msg{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
    align-items:center;
}

.left{
    display:flex;
    gap:8px;
}

.time{
    color:gray;
    font-size:12px;
}

.icon{
    cursor:pointer;
    margin-left:6px;
    color:#888;
}

.icon:hover{
    color:white;
}

#input{
    position:absolute;
    bottom:0;
    left:0;
    width:65%;
    height:50px;
    background:black;
    border:none;
    outline:none;
    color:white;
    font-family:"Courier New",monospace;
}

button{
    position:absolute;
    bottom:0;
    height:50px;
    border:none;
    font-family:"Courier New",monospace;
}

#send{right:15%;width:15%;background:#00aa44;}
#clear{right:0;width:15%;background:#aa0000;color:white;}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getDatabase, ref, push, onChildAdded, remove, update
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

const messages = document.getElementById("messages");
const input = document.getElementById("input");

let username = "anon";
let admin = false;

/* ID */
const tabId = Math.random().toString(16).slice(2);

/* time */
function time(){
return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

/* hidden command */
function handleCommands(text){

if(text.startsWith("?name ")){
username = text.replace("?name ","").trim() || "anon";
return true;
}

if(text.startsWith("?proveownership ")){
const code = text.split(" ")[1];
if(code === "ABCXY"){
admin = true;
alert("Admin mode enabled");
}
return true;
}

if(text === "?help"){
const help =
`Commands:

- ?name <name> Sets your name
- ?help Shows this help menu`;

addLocal(help,"system");
return true;
}

return false;
}

/* local system message */
function addLocal(text,name){
const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");
left.textContent = `<${name}> ${text}`;

const t = document.createElement("div");
t.className="time";
t.textContent = time();

div.appendChild(left);
div.appendChild(t);

messages.appendChild(div);
}

function send(){

const text = input.value.trim();
if(!text) return;

if(handleCommands(text)){
input.value="";
return;
}

push(messagesRef,{
text,
name:username,
time:time()
});

input.value="";
}

document.getElementById("send").onclick = send;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

document.getElementById("clear").onclick=()=>{
remove(messagesRef);
messages.innerHTML="";
};

/* render */
onChildAdded(messagesRef,(snap)=>{

const msg = snap.val();
const id = snap.key;

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");

left.textContent = `<${msg.name}> ${msg.text}`;

const right = document.createElement("div");
right.style.display="flex";

const t = document.createElement("span");
t.className="time";
t.textContent = msg.time;

/* admin controls */
if(admin){

const del = document.createElement("span");
del.textContent="🗑";
del.className="icon";
del.onclick=()=> remove(ref(db,"messages/"+id));

const edit = document.createElement("span");
edit.textContent="✏";
edit.className="icon";
edit.onclick=()=>{

const newText = prompt("Edit message:",msg.text);
if(newText !== null){
update(ref(db,"messages/"+id),{
text:newText
});
}
};

right.appendChild(del);
right.appendChild(edit);
}

right.appendChild(t);

div.appendChild(left);
div.appendChild(right);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
