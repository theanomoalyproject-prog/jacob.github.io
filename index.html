<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

/* messages */
#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:8px;
    color:white;
    font-size:clamp(14px,4vw,20px);
}

.msg{
    display:flex;
    justify-content:space-between;
    margin-bottom:4px;
}

.time{
    color:gray;
    font-size:12px;
    white-space:nowrap;
}

/* input */
#input{
    position:absolute;
    bottom:0;
    left:0;
    width:65%;
    height:50px;
    background:black;
    border:none;
    outline:none;
    color:white;
    font-family:"Courier New",monospace;
    padding-left:8px;
    caret-color:white;
}

button{
    position:absolute;
    bottom:0;
    height:50px;
    border:none;
    font-family:"Courier New",monospace;
}

#send{
    right:15%;
    width:15%;
    background:#00aa44;
    color:black;
}

#clear{
    right:0;
    width:15%;
    background:#aa0000;
    color:white;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const send = document.getElementById("send");
const clear = document.getElementById("clear");

const messagesRef = ref(db,"messages");

/* identity */
let username = "anon";

/* per-tab colour */
const tabId = Math.random().toString(16).slice(2);

function colorFromId(id){
let hash = 0;
for(let i=0;i<id.length;i++){
hash = id.charCodeAt(i) + ((hash<<5)-hash);
}
const colors = ["#00ff66","#66aaff","#ff6666","#ffcc00","#cc66ff","#66ffcc","#ff66aa"];
return colors[Math.abs(hash)%colors.length];
}

const userColor = colorFromId(tabId);

/* time */
function getTime(){
return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

/* focus */
function focus(){
input.focus();
}
window.addEventListener("load",focus);
window.addEventListener("click",focus);
window.addEventListener("keydown",focus);

/* commands */
function handleCommands(text){
if(text.startsWith("?name ")){
username = text.replace("?name ","").trim() || "anon";
return true;
}

if(text === "?help"){
const help =
`Commands:

- ?name <name> Sets your name
- ?help Shows this help menu`;

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");
left.textContent = `<system> ${help}`;

const time = document.createElement("div");
time.className="time";
time.textContent = getTime();

div.appendChild(left);
div.appendChild(time);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

return true;
}

return false;
}

/* send */
function sendMessage(){

const text = input.value.trim();
if(!text) return;

if(handleCommands(text)){
input.value="";
return;
}

push(messagesRef,{
text,
name: username,
color: userColor,
time: getTime()
});

input.value="";
}

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") sendMessage();
});

send.addEventListener("click",sendMessage);

clear.addEventListener("click",()=>{
remove(messagesRef);
messages.innerHTML="";
});

/* receive */
onChildAdded(messagesRef,(data)=>{

const msg = data.val();

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");

const name = document.createElement("span");
name.textContent = `<${msg.name}> `;
name.style.color = msg.color;

const text = document.createElement("span");
text.textContent = msg.text;
text.style.color = "white";

left.appendChild(name);
left.appendChild(text);

const time = document.createElement("div");
time.className="time";
time.textContent = msg.time;

div.appendChild(left);
div.appendChild(time);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
