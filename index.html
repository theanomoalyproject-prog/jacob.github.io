<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:"Courier New",monospace;
}

/* messages */
#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:8px;
    font-size:clamp(14px,4vw,20px);
    color:white;
    white-space:pre-wrap;
}

.msg{
    margin-bottom:4px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.time{
    color:gray;
    font-size:12px;
    white-space:nowrap;
}

/* input */
#input{
    position:absolute;
    bottom:0;
    left:0;
    width:65%;
    height:50px;
    border:none;
    outline:none;
    background:black;
    color:white;
    font-family:"Courier New",monospace;
    font-size:clamp(14px,4vw,20px);
    padding-left:8px;
    caret-color:white;
}

button{
    position:absolute;
    bottom:0;
    height:50px;
    border:none;
    font-family:"Courier New",monospace;
}

#send{
    right:15%;
    width:15%;
    background:#00aa44;
    color:black;
}

#clear{
    right:0;
    width:15%;
    background:#aa0000;
    color:white;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
    authDomain: "jacob-chat.firebaseapp.com",
    databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jacob-chat",
    storageBucket: "jacob-chat.firebasestorage.app",
    messagingSenderId: "554355410181",
    appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById("input");
const messages = document.getElementById("messages");
const send = document.getElementById("send");
const clear = document.getElementById("clear");

const messagesRef = ref(db,"messages");

/* identity */
const tabId = Math.random().toString(16).slice(2);

function colorFromId(id){
    let hash = 0;
    for(let i=0;i<id.length;i++){
        hash = id.charCodeAt(i) + ((hash<<5)-hash);
    }
    const colors = ["#00ff66","#66aaff","#ff6666","#ffcc00","#cc66ff","#66ffcc","#ff66aa"];
    return colors[Math.abs(hash) % colors.length];
}

const userColor = colorFromId(tabId);

let username = "anon";

/* time */
function getTime(){
    const d = new Date();
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

/* focus */
function focus(){
    input.focus();
}
window.addEventListener("load",focus);
window.addEventListener("click",focus);
window.addEventListener("keydown",focus);

/* LOCAL HELP (ONLY FOR YOU) */
function showHelpLocal(){

    const help =
`Commands:

- ?name <name> Sets your name
- ?help Shows this help menu`;

    const div = document.createElement("div");
    div.className = "msg";

    const left = document.createElement("div");

    const nameSpan = document.createElement("span");
    nameSpan.textContent = "<system>";
    nameSpan.style.color = "#aaaaaa";

    const textSpan = document.createElement("span");
    textSpan.textContent = " " + help;

    left.appendChild(nameSpan);
    left.appendChild(textSpan);

    const timeSpan = document.createElement("div");
    timeSpan.className = "time";
    timeSpan.textContent = getTime();

    div.appendChild(left);
    div.appendChild(timeSpan);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

/* send */
function sendMessage(){

    const text = input.value.trim();
    if(!text) return;

    /* NAME */
    if(text.startsWith("?name ")){
        username = text.replace("?name ","").trim() || "anon";
        input.value="";
        return;
    }

    /* HELP (LOCAL ONLY) */
    if(text === "?help"){
        showHelpLocal();
        input.value="";
        return;
    }

    push(messagesRef,{
        text,
        name: username,
        color: userColor,
        time: getTime()
    });

    input.value="";
}

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") sendMessage();
});

send.addEventListener("click",sendMessage);

clear.addEventListener("click",()=>{
    remove(messagesRef);
    messages.innerHTML="";
});

/* receive */
onChildAdded(messagesRef,(data)=>{

    const msg = data.val();

    const name = msg.name || "anon";
    const text = msg.text || "";
    const color = msg.color || "#ffffff";
    const time = msg.time || "";

    const div = document.createElement("div");
    div.className = "msg";

    const left = document.createElement("div");

    const nameSpan = document.createElement("span");
    nameSpan.textContent = `<${name}>`;
    nameSpan.style.color = color;

    const textSpan = document.createElement("span");
    textSpan.textContent = ` ${text}`;

    left.appendChild(nameSpan);
    left.appendChild(textSpan);

    const timeSpan = document.createElement("div");
    timeSpan.className = "time";
    timeSpan.textContent = time;

    div.appendChild(left);
    div.appendChild(timeSpan);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
});

</script>

</body>
</html>
