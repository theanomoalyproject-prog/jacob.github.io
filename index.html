<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

#messages{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:90px;
    overflow-y:auto;
    padding:10px;
    color:white;
}

.msg{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:6px;
    gap:10px;
    line-height:1.3;
}

#input{
    position:fixed;
    bottom:0;
    left:0;
    width:70%;
    height:90px;
    background:#050505;
    border-top:1px solid #222;
    outline:none;
    color:#00ff66;
    font-family:"Courier New",monospace;
    font-size:16px;
    padding:10px;
    box-sizing:border-box;
    caret-color:#00ff66;
}

button{
    position:fixed;
    bottom:0;
    height:90px;
    border:none;
    font-family:"Courier New",monospace;
    cursor:pointer;
}

#send{
    right:15%;
    width:15%;
    background:#00aa44;
}

#clear{
    right:0;
    width:15%;
    background:#aa0000;
    color:white;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getDatabase,
ref,
push,
onChildAdded,
remove,
set,
onDisconnect
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

const messages = document.getElementById("messages");
const input = document.getElementById("input");

let username = "anon";

/* unique session */
const sessionId = Math.random().toString(16).slice(2);

/* focus */
window.addEventListener("load",()=>input.focus());
window.addEventListener("click",()=>input.focus());

function time(){
return new Date().toLocaleTimeString([], {
hour:"2-digit",
minute:"2-digit"
});
}

/* typing animation */
function typeText(element, text, speed = 32){

let i = 0;

function step(){

if(i < text.length){
element.textContent += text[i];
i++;
setTimeout(step, speed);
}

}

step();
}

/* message builder */
function createMessage(name, text, timeText, color="#00ff66"){

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");

const nameSpan = document.createElement("span");
nameSpan.textContent = `<${name}> `;
nameSpan.style.color = color;

const textSpan = document.createElement("span");

left.appendChild(nameSpan);
left.appendChild(textSpan);

const right = document.createElement("div");
right.style.color="gray";
right.textContent=timeText;

div.appendChild(left);
div.appendChild(right);

messages.appendChild(div);

messages.scrollTop = messages.scrollHeight;

typeText(textSpan, text, 32);
}

/* system message */
function systemMessage(text){

createMessage(
"system",
text,
time(),
"gray"
);

}

/* user presence */
const userRef = ref(db,"presence/"+sessionId);

set(userRef,{
online:true
});

/* disconnect cleanup */
onDisconnect(userRef).remove();

/* JOIN MESSAGE */
push(messagesRef,{
system:true,
text:`${username} joined the chat`,
time:time()
});

/* LEAVE MESSAGE */
window.addEventListener("beforeunload",()=>{

push(messagesRef,{
system:true,
text:`${username} left the chat`,
time:time()
});

});

/* commands */
function handleCommands(text){

if(text.startsWith("?name ")){

username = text.replace("?name ","").trim() || "anon";

systemMessage(`name changed to ${username}`);

return true;
}

if(text === "?help"){

const help =
"Commands:\n\n" +
"?name name - Sets your name\n" +
"?help - Shows this help menu";

systemMessage(help);

return true;
}

return false;
}

/* send */
function send(){

const text = input.value.trim();

if(!text) return;

if(handleCommands(text)){
input.value="";
return;
}

push(messagesRef,{
text,
name:username,
time:time()
});

input.value="";
}

document.getElementById("send").onclick=send;

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){
send();
}

});

document.getElementById("clear").onclick=()=>{

remove(messagesRef);
messages.innerHTML="";

};

/* render */
onChildAdded(messagesRef,(snap)=>{

const msg = snap.val();

/* system */
if(msg.system){

createMessage(
"system",
msg.text,
msg.time,
"gray"
);

return;
}

/* normal */
createMessage(
msg.name,
msg.text,
msg.time
);

});

</script>

</body>
</html>
