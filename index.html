<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Lucide icon library (vector icons) -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

/* CHAT WINDOW */
#messages{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:10px;
    color:white;
    font-size:clamp(14px,4vw,18px);
    box-sizing:border-box;
}

/* MESSAGE ROW */
.msg{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    gap:10px;
}

/* LEFT SIDE */
.left{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

/* TIMESTAMP */
.time{
    color:gray;
    font-size:12px;
    white-space:nowrap;
}

/* INPUT BAR */
#input{
    position:fixed;
    bottom:0;
    left:0;
    width:65%;
    height:60px;
    background:black;
    border:none;
    outline:none;
    color:white;
    font-family:"Courier New",monospace;
    font-size:16px;
    padding-left:10px;
    box-sizing:border-box;
}

/* BUTTONS */
button{
    position:fixed;
    bottom:0;
    height:60px;
    border:none;
    font-family:"Courier New",monospace;
    cursor:pointer;
}

#send{
    right:15%;
    width:15%;
    background:#00aa44;
}

#clear{
    right:0;
    width:15%;
    background:#aa0000;
    color:white;
}

/* ICON BUTTONS */
.icon{
    width:16px;
    height:16px;
    cursor:pointer;
    margin-left:6px;
    color:#888;
}

.icon:hover{
    color:white;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getDatabase, ref, push, onChildAdded, remove, update
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

const messages = document.getElementById("messages");
const input = document.getElementById("input");

let username = "anon";
let admin = false;

/* stable per-tab colour */
const tabId = Math.random().toString(16).slice(2);

function colorFromId(id){
let hash = 0;
for(let i=0;i<id.length;i++){
hash = id.charCodeAt(i) + ((hash<<5)-hash);
}
const colors = ["#00ff66","#66aaff","#ff6666","#ffcc00","#cc66ff","#66ffcc","#ff66aa"];
return colors[Math.abs(hash)%colors.length];
}

const userColor = colorFromId(tabId);

/* time */
function time(){
return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

/* commands */
function handleCommands(text){

if(text.startsWith("?name ")){
username = text.replace("?name ","").trim() || "anon";
return true;
}

if(text.startsWith("?proveownership ")){
if(text.split(" ")[1] === "ABCXY"){
admin = true;
alert("Admin enabled");
}
return true;
}

if(text === "?help"){
addLocal(`Commands:

- ?name <name> Sets your name
- ?help Shows this help menu`,"system");
return true;
}

return false;
}

/* local message */
function addLocal(text,name){
const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");
left.textContent = `<${name}> ${text}`;

const t = document.createElement("div");
t.className="time";
t.textContent = time();

div.appendChild(left);
div.appendChild(t);

messages.appendChild(div);
}

/* send */
function send(){

const text = input.value.trim();
if(!text) return;

if(handleCommands(text)){
input.value="";
return;
}

push(messagesRef,{
text,
name:username,
color:userColor,
time:time()
});

input.value="";
}

document.getElementById("send").onclick=send;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

document.getElementById("clear").onclick=()=>{
remove(messagesRef);
messages.innerHTML="";
};

/* render */
onChildAdded(messagesRef,(snap)=>{

const msg = snap.val();
const id = snap.key;

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");

const nameSpan = document.createElement("span");
nameSpan.textContent = `<${msg.name}> `;
nameSpan.style.color = msg.color || "#fff";

const textSpan = document.createElement("span");
textSpan.textContent = msg.text;

left.appendChild(nameSpan);
left.appendChild(textSpan);

const right = document.createElement("div");
right.style.display="flex";
right.style.alignItems="center";

/* time */
const t = document.createElement("span");
t.className="time";
t.textContent = msg.time;

/* ADMIN ICONS (Lucide SVG) */
if(admin){

const del = document.createElement("i");
del.setAttribute("data-lucide","trash-2");
del.className="icon";
del.onclick=()=> remove(ref(db,"messages/"+id));

const edit = document.createElement("i");
edit.setAttribute("data-lucide","edit-3");
edit.className="icon";
edit.onclick=()=>{

const newText = prompt("Edit message:",msg.text);
if(newText !== null){
update(ref(db,"messages/"+id),{
text:newText
});
}
};

right.appendChild(del);
right.appendChild(edit);
}

/* render */
right.appendChild(t);

div.appendChild(left);
div.appendChild(right);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

/* activate icons */
lucide.createIcons();

});

</script>

</body>
</html>
