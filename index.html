<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:"Courier New",monospace;
    font-size:20px;
}

/* messages */
#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:70px;
    overflow-y:auto;
    padding:8px;
    white-space:pre-wrap;
    color:white;
}

.msg{
    margin-bottom:2px;
}

/* input */
#input{
    position:absolute;
    bottom:0;
    left:0;
    width:70%;
    height:40px;
    border:none;
    outline:none;
    background:black;
    color:#00ff66;
    font-family:"Courier New",monospace;
    font-size:20px;
    padding-left:8px;
    caret-color:#00ff66;
}

/* buttons */
#sendBtn, #clearBtn{
    position:absolute;
    bottom:0;
    height:40px;
    width:15%;
    border:none;
    font-family:"Courier New",monospace;
    font-size:16px;
    cursor:pointer;
}

#sendBtn{
    right:15%;
    background:#00aa44;
    color:black;
}

#clearBtn{
    right:0;
    background:#aa0000;
    color:white;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">

<button id="sendBtn">SEND</button>
<button id="clearBtn">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
    authDomain: "jacob-chat.firebaseapp.com",
    databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jacob-chat",
    storageBucket: "jacob-chat.firebasestorage.app",
    messagingSenderId: "554355410181",
    appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById("input");
const messages = document.getElementById("messages");
const sendBtn = document.getElementById("sendBtn");
const clearBtn = document.getElementById("clearBtn");

const messagesRef = ref(db,"messages");

let username = "anon";

/* keep typing working */
function focusInput(){
    input.focus();
}

window.addEventListener("load",focusInput);
window.addEventListener("click",focusInput);
window.addEventListener("keydown",focusInput);

/* handle send */
function sendMessage(){

    const raw = input.value.trim();
    if(!raw) return;

    /* NAME COMMAND */
    if(raw.startsWith("?name ")){
        username = raw.replace("?name ","").trim() || "anon";
        input.value = "";
        return;
    }

    push(messagesRef,{
        text: raw,
        name: username
    });

    input.value = "";
}

/* ENTER key */
input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
        sendMessage();
    }
});

/* send button */
sendBtn.addEventListener("click",sendMessage);

/* clear chat (local only view) */
clearBtn.addEventListener("click",()=>{
    messages.innerHTML="";
});

/* receive messages */
onChildAdded(messagesRef,(data)=>{

    const msg = data.val();

    const div = document.createElement("div");
    div.className = "msg";

    const name = msg.name || "anon";
    const text = msg.text || "";

    div.textContent = "<" + name + "> " + text;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
});

</script>

</body>
</html>
