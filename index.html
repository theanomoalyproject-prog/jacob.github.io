<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

/* LOGIN */
#login{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
    color:white;
}

input{
    background:black;
    border:1px solid #333;
    color:white;
    padding:10px;
    font-family:"Courier New",monospace;
    width:220px;
}

button{
    padding:10px;
    border:none;
    font-family:"Courier New",monospace;
    cursor:pointer;
}

#loginBtn{background:#00aa44;}
#registerBtn{background:#666;}
#skipBtn{background:#333;color:white;}

/* CHAT */
#chat{
    display:none;
}

#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:8px;
    color:white;
    font-size:clamp(14px,4vw,20px);
}

.msg{
    display:flex;
    justify-content:space-between;
    margin-bottom:4px;
}

.time{color:gray;font-size:12px;}

#input{
    position:absolute;
    bottom:0;
    left:0;
    width:65%;
    height:50px;
    background:black;
    color:white;
    border:none;
    outline:none;
    font-family:"Courier New",monospace;
}

#send{
    position:absolute;
    right:15%;
    bottom:0;
    width:15%;
    height:50px;
    background:#00aa44;
}

#logout{
    position:absolute;
    right:0;
    bottom:0;
    width:15%;
    height:50px;
    background:#aa0000;
    color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">

    <button id="registerBtn">Register</button>
    <button id="loginBtn">Login</button>
    <button id="skipBtn">Guest</button>
</div>

<!-- CHAT -->
<div id="chat">

<div id="messages"></div>

<input id="input">
<button id="send">SEND</button>
<button id="logout">LOGOUT</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded,
set,
get,
child
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* UI */
const loginUI = document.getElementById("login");
const chatUI = document.getElementById("chat");

const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");

const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* username */
let currentUsername = "guest";

/* convert username → fake email */
function toEmail(username){
return username + "@chat.local";
}

/* REGISTER */
document.getElementById("registerBtn").onclick = async () => {

const u = usernameInput.value.trim();
const p = passwordInput.value;

if(!u || !p) return;

await createUserWithEmailAndPassword(auth,toEmail(u),p);

await set(ref(db,"users/"+auth.currentUser.uid),{
username:u
});

};

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {

const u = usernameInput.value.trim();
const p = passwordInput.value;

await signInWithEmailAndPassword(auth,toEmail(u),p);

};

/* GUEST */
document.getElementById("skipBtn").onclick = () => {
currentUsername = "guest";
loginUI.style.display="none";
chatUI.style.display="block";
};

/* LOGOUT */
document.getElementById("logout").onclick = () => {
signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth,async (user)=>{

if(user){

const snap = await get(child(ref(db),"users/"+user.uid));
currentUsername = snap.exists() ? snap.val().username : "user";

loginUI.style.display="none";
chatUI.style.display="block";

}else{

loginUI.style.display="flex";
chatUI.style.display="none";

}

});

/* SEND */
document.getElementById("send").onclick = () => {

const text = input.value.trim();
if(!text) return;

push(ref(db,"messages"),{
text,
name: currentUsername,
time: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
});

input.value="";
};

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") document.getElementById("send").click();
});

/* RECEIVE */
onChildAdded(ref(db,"messages"),(data)=>{

const msg = data.val();

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");
left.textContent = `<${msg.name}> ${msg.text}`;

const time = document.createElement("div");
time.className="time";
time.textContent = msg.time;

div.appendChild(left);
div.appendChild(time);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
