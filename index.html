<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

#messages{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:90px;
    overflow-y:auto;
    padding:10px;
    color:white;
}

.msg{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
    gap:10px;
    line-height:1.3;
}

#inputWrap{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:90px;
    background:#050505;
    border-top:1px solid #222;
}

#input{
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    color:#00ff66;
    font-family:"Courier New",monospace;
    font-size:16px;
    padding:10px 60px 10px 10px;
    box-sizing:border-box;
    caret-color:#00ff66;
}

#uploadBtn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    font-size:26px;
    cursor:pointer;
    user-select:none;
    color:#00ff66;
}

#imageUpload{
    display:none;
}

button{
    display:none;
}

.chatImage{
    margin-top:8px;
    max-width:320px;
    max-height:320px;
    border:1px solid #333;
}

.ownerTag{
    color:gold;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="messages"></div>

<div id="inputWrap">
<input id="input" autocomplete="off">

<label id="uploadBtn">
📷
<input type="file" id="imageUpload" accept="image/*">
</label>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db,"messages");

/* CLOUDINARY */
const CLOUD_NAME = "dximojchf";
const UPLOAD_PRESET = "chatimages";

/* ELEMENTS */
const messages = document.getElementById("messages");
const input = document.getElementById("input");
const imageUpload = document.getElementById("imageUpload");

/* COOKIE SYSTEM */
function setCookie(n,v,d){
let e="";
if(d){
const t=new Date();
t.setTime(t.getTime()+d*86400000);
e="; expires="+t.toUTCString();
}
document.cookie=n+"="+v+e+"; path=/";
}

function getCookie(n){
return document.cookie.split("; ").find(r=>r.startsWith(n+"="))?.split("=")[1];
}

let username=getCookie("username")||"anon";
let userId=getCookie("userId")||Math.random().toString(36).slice(2,10);

setCookie("userId",userId,365);

/* HELPERS */
function time(){
const now=new Date();
return {
clock:now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}),
timestamp:now.getTime()
};
}

function hashColor(str){
let h=0;
for(let i=0;i<str.length;i++) h=str.charCodeAt(i)+((h<<5)-h);
return `hsl(${h%360},80%,60%)`;
}

/* TYPE */
function typeText(el,text,speed=25){
let i=0;
function step(){
if(i<text.length){
el.textContent+=text[i++];
setTimeout(step,speed);
}
}
step();
}

/* MESSAGE */
function createMessage(name,text,clock,date,color,image){
const div=document.createElement("div");
div.className="msg";

const left=document.createElement("div");

const nameSpan=document.createElement("span");
nameSpan.textContent=`<${name}> `;
nameSpan.style.color=color;

const textSpan=document.createElement("span");

left.appendChild(nameSpan);
left.appendChild(textSpan);

if(image){
const img=document.createElement("img");
img.src=image;
img.className="chatImage";
left.appendChild(document.createElement("br"));
left.appendChild(img);
}

const right=document.createElement("div");
right.style.color="gray";
right.innerHTML=`${clock}<br>${date}`;

div.appendChild(left);
div.appendChild(right);

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;

if(text) typeText(textSpan,text);
}

/* DATE */
function formatDate(ts){
const now=new Date();
const d=new Date(ts);

const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
const yesterday=new Date(today);
yesterday.setDate(today.getDate()-1);

const msgDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());

if(msgDay.getTime()===today.getTime()) return "Today";
if(msgDay.getTime()===yesterday.getTime()) return "Yesterday";
return d.toLocaleDateString("en-GB");
}

/* SEND */
function send(){
const text=input.value.trim();
if(!text) return;

const t=time();

push(messagesRef,{
text,
name:username,
userId,
clock:t.clock,
timestamp:t.timestamp
});

input.value="";
}

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

/* IMAGE UPLOAD */
imageUpload.addEventListener("change",async(e)=>{
const file=e.target.files[0];
if(!file) return;

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset",UPLOAD_PRESET);

const res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{method:"POST",body:formData}
);

const data=await res.json();

const t=time();

push(messagesRef,{
text:"",
image:data.secure_url,
name:username,
userId,
clock:t.clock,
timestamp:t.timestamp
});

imageUpload.value="";
});

/* RENDER */
onChildAdded(messagesRef,(snap)=>{
const msg=snap.val();

createMessage(
msg.name,
msg.text,
msg.clock,
formatDate(msg.timestamp),
hashColor(msg.userId||msg.name),
msg.image||null
);
});

</script>

</body>
</html>
