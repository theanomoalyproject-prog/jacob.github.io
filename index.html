<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

#messages{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:90px;
    overflow-y:auto;
    padding:10px;
    color:white;
}

.msg{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:6px;
    gap:10px;
    line-height:1.3;
}

#input{
    position:fixed;
    bottom:0;
    left:0;
    width:70%;
    height:90px;
    background:#050505;
    border-top:1px solid #222;
    outline:none;
    color:#00ff66;
    font-family:"Courier New",monospace;
    font-size:16px;
    padding:10px;
    box-sizing:border-box;
    caret-color:#00ff66;
}

button{
    position:fixed;
    bottom:0;
    height:90px;
    border:none;
    font-family:"Courier New",monospace;
    cursor:pointer;
}

#send{right:15%;width:15%;background:#00aa44;}
#clear{right:0;width:15%;background:#aa0000;color:white;}
</style>
</head>

<body>

<div id="messages"></div>
<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getDatabase, ref, push, onChildAdded, remove
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messagesRef = ref(db,"messages");

const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* ---------------- COOKIE SYSTEM ---------------- */

function setCookie(name, value, days){
    let expires = "";
    if(days){
        const date = new Date();
        date.setTime(date.getTime() + (days*24*60*60*1000));
        expires = "; expires=" + date.toUTCString();
    }
    document.cookie = name + "=" + value + expires + "; path=/";
}

function getCookie(name){
    const cookies = document.cookie.split("; ");
    for(let c of cookies){
        const [key,value] = c.split("=");
        if(key === name) return value;
    }
    return null;
}

let userId = getCookie("userId");
if(!userId){
    userId = Math.random().toString(36).substring(2,10);
    setCookie("userId", userId, 365);
}

let username = getCookie("username") || "anon";

/* ---------------- HELPERS ---------------- */

function time(){
    return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

function hashColor(str){
    let hash = 0;
    for(let i=0;i<str.length;i++){
        hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    return `hsl(${hash % 360}, 80%, 60%)`;
}

/* TYPE EFFECT */
function typeText(element, text, speed=32){
    let i=0;
    function step(){
        if(i<text.length){
            element.textContent += text[i++];
            setTimeout(step,speed);
        }
    }
    step();
}

/* ---------------- MESSAGE RENDER ---------------- */

function createMessage(name,text,timeText,color="#00ff66"){
    const div=document.createElement("div");
    div.className="msg";

    const left=document.createElement("div");

    const nameSpan=document.createElement("span");
    nameSpan.textContent=`<${name}> `;
    nameSpan.style.color=color;

    const textSpan=document.createElement("span");

    left.appendChild(nameSpan);
    left.appendChild(textSpan);

    const right=document.createElement("div");
    right.style.color="gray";
    right.textContent=timeText;

    div.appendChild(left);
    div.appendChild(right);

    messages.appendChild(div);
    messages.scrollTop=messages.scrollHeight;

    typeText(textSpan,text,32);
}

/* ---------------- COMMANDS ---------------- */

function handleCommands(text){

/* name */
if(text.startsWith("?name ")){
    username = text.replace("?name ","").trim() || "anon";
    setCookie("username",username,365);
    return true;
}

/* help */
if(text === "?help"){
    createMessage(
        "system",
        "?name name\n?msg user message\n?help",
        time(),
        "gray"
    );
    return true;
}

/* PRIVATE MESSAGE */
if(text.startsWith("?msg ")){
    const parts = text.split(" ");
    const target = parts[1]?.toLowerCase();
    const msg = parts.slice(2).join(" ");

    if(!target || !msg) return true;

    push(messagesRef,{
        text: msg,
        name: username,
        userId: userId,
        to: target,
        time: time(),
        private: true
    });

    return true;
}

return false;
}

/* ---------------- SEND ---------------- */

function send(){
    const text = input.value.trim();
    if(!text) return;

    if(handleCommands(text)){
        input.value="";
        return;
    }

    push(messagesRef,{
        text,
        name: username,
        userId: userId,
        time: time(),
        private:false
    });

    input.value="";
}

document.getElementById("send").onclick=send;

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") send();
});

document.getElementById("clear").onclick=()=>{
    remove(messagesRef);
    messages.innerHTML="";
};

/* ---------------- RENDER ---------------- */

onChildAdded(messagesRef,(snap)=>{

const msg = snap.val();

const current = username.toLowerCase();

/* PRIVATE FILTER */
if(msg.private){
    const isSender = msg.name === username;
    const isReceiver = msg.to === current;

    if(!isSender && !isReceiver) return;

    createMessage(
        `${msg.name} --> ${msg.to}`,
        msg.text,
        msg.time,
        hashColor(msg.name)
    );

    return;
}

/* NORMAL MESSAGE */
createMessage(
msg.name,
msg.text,
msg.time,
hashColor(msg.userId || msg.name)
);

});

</script>

</body>
</html>
