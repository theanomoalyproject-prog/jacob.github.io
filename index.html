<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

/* LOGIN SCREEN */
#login{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:10px;
    color:white;
}

input{
    background:black;
    border:1px solid #333;
    color:white;
    padding:10px;
    font-family:"Courier New",monospace;
    width:220px;
}

button{
    background:#00aa44;
    border:none;
    padding:10px;
    font-family:"Courier New",monospace;
    cursor:pointer;
}

#skip{
    background:#555;
}

/* CHAT */
#chat{
    display:none;
}

#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:8px;
    font-size:clamp(14px,4vw,20px);
    color:white;
}

.msg{
    display:flex;
    justify-content:space-between;
    margin-bottom:4px;
}

.time{
    color:gray;
    font-size:12px;
}

#input{
    position:absolute;
    bottom:0;
    left:0;
    width:65%;
    height:50px;
    background:black;
    color:white;
    border:none;
    outline:none;
    font-family:"Courier New",monospace;
}

#send{
    position:absolute;
    right:15%;
    bottom:0;
    width:15%;
    height:50px;
    background:#00aa44;
}

#logout{
    position:absolute;
    right:0;
    bottom:0;
    width:15%;
    height:50px;
    background:#aa0000;
    color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <input id="email" placeholder="email">
    <input id="pass" type="password" placeholder="password">
    <button id="loginBtn">Login</button>
    <button id="registerBtn">Register</button>
    <button id="skip">Skip (Guest)</button>
</div>

<!-- CHAT -->
<div id="chat">

<div id="messages"></div>

<input id="input">
<button id="send">SEND</button>
<button id="logout">LOGOUT</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

import {
getDatabase,
ref,
push,
onChildAdded
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

/* UI */
const loginUI = document.getElementById("login");
const chatUI = document.getElementById("chat");

const email = document.getElementById("email");
const pass = document.getElementById("pass");

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const skipBtn = document.getElementById("skip");

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const send = document.getElementById("send");
const logout = document.getElementById("logout");

/* USER */
let username = "guest";

/* LOGIN */
loginBtn.onclick = async () => {
await signInWithEmailAndPassword(auth,email.value,pass.value);
};

registerBtn.onclick = async () => {
await createUserWithEmailAndPassword(auth,email.value,pass.value);
};

skipBtn.onclick = () => {
username = "guest";
loginUI.style.display="none";
chatUI.style.display="block";
};

logout.onclick = () => {
signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{

if(user){
username = user.email.split("@")[0];

loginUI.style.display="none";
chatUI.style.display="block";
}else{

loginUI.style.display="flex";
chatUI.style.display="none";

}

});

/* SEND */
send.onclick = () => {
const text = input.value.trim();
if(!text) return;

push(messagesRef,{
text,
name: username,
time: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
});

input.value="";
};

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send.click();
});

/* RECEIVE */
onChildAdded(messagesRef,(data)=>{

const msg = data.val();

const div = document.createElement("div");
div.className="msg";

const left = document.createElement("div");
left.textContent = `<${msg.name}> ${msg.text}`;

const time = document.createElement("div");
time.className="time";
time.textContent = msg.time;

div.appendChild(left);
div.appendChild(time);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
