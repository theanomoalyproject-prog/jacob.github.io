<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    font-family:"Courier New",monospace;
    overflow:hidden;
}

/* messages area */
#messages{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:10px;
    color:white;
}

/* message row */
.msg{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
    gap:10px;
}

/* left side */
.left{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

/* timestamp */
.time{
    color:gray;
    font-size:12px;
    white-space:nowrap;
}

/* input */
#input{
    position:fixed;
    bottom:0;
    left:0;
    width:65%;
    height:60px;
    background:black;
    border:none;
    outline:none;
    color:white;
    font-family:"Courier New",monospace;
    padding-left:10px;
}

/* buttons */
button{
    position:fixed;
    bottom:0;
    height:60px;
    border:none;
    font-family:"Courier New",monospace;
    cursor:pointer;
}

#send{right:15%;width:15%;background:#00aa44;}
#clear{right:0;width:15%;background:#aa0000;color:white;}

/* ICON FIXED */
.icon{
    width:18px;
    height:18px;
    cursor:pointer;
    margin-left:8px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
}

.icon svg{
    width:18px;
    height:18px;
    display:block;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getDatabase, ref, push, onChildAdded, remove, update
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
authDomain: "jacob-chat.firebaseapp.com",
databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "jacob-chat",
storageBucket: "jacob-chat.firebasestorage.app",
messagingSenderId: "554355410181",
appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const messagesRef = ref(db,"messages");

const messages = document.getElementById("messages");
const input = document.getElementById("input");

let username = "anon";
let admin = false;

/* color system */
const tabId = Math.random().toString(16).slice(2);

function colorFromId(id){
let hash = 0;
for(let i=0;i<id.length;i++){
hash = id.charCodeAt(i) + ((hash<<5)-hash);
}
const colors = [
"#00ff66","#66aaff","#ff6666",
"#ffcc00","#cc66ff","#66ffcc","#ff66aa"
];
return colors[Math.abs(hash)%colors.length];
}

const userColor = colorFromId(tabId);

/* time */
function time(){
return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
}

/* commands */
function handleCommands(text){

if(text.startsWith("?name ")){
username = text.replace("?name ","").trim() || "anon";
return true;
}

if(text.startsWith("?proveownership ")){
if(text.split(" ")[1] === "ABCXY"){
admin = true;
alert("Admin enabled");
}
return true;
}

if(text === "?help"){
addLocal(`Commands:

- ?name <name> Sets your name
- ?help Shows this help menu`,"system");
return true;
}

return false;
}

/* local message */
function addLocal(text,name){
const div = document.createElement("div");
div.className="msg";

div.innerHTML = `
<div><span style="color:gray">&lt;${name}&gt;</span> ${text}</div>
<div class="time">${time()}</div>
`;

messages.appendChild(div);
}

/* send message */
function send(){

const text = input.value.trim();
if(!text) return;

if(handleCommands(text)){
input.value="";
return;
}

push(messagesRef,{
text,
name:username,
color:userColor,
time:time()
});

input.value="";
}

document.getElementById("send").onclick=send;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter") send();
});

document.getElementById("clear").onclick=()=>{
remove(messagesRef);
messages.innerHTML="";
};

/* render messages */
onChildAdded(messagesRef,(snap)=>{

const msg = snap.val();
const id = snap.key;

const div = document.createElement("div");
div.className="msg";

/* left side */
const left = document.createElement("div");

const nameSpan = document.createElement("span");
nameSpan.textContent = `<${msg.name}> `;
nameSpan.style.color = msg.color;

const textSpan = document.createElement("span");
textSpan.textContent = msg.text;

left.appendChild(nameSpan);
left.appendChild(textSpan);

/* right side */
const right = document.createElement("div");
right.style.display="flex";
right.style.alignItems="center";

/* DELETE ICON (FIXED SVG COLOR) */
if(admin){

const del = document.createElement("span");
del.className="icon";
del.innerHTML = `
<svg viewBox="0 0 24 24" width="18" height="18"
fill="none" stroke="#888" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">
<polyline points="3 6 5 6 21 6"/>
<path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
<path d="M10 11v6"/>
<path d="M14 11v6"/>
<path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
</svg>`;

del.onclick=()=> remove(ref(db,"messages/"+id));

/* EDIT ICON */
const edit = document.createElement("span");
edit.className="icon";
edit.innerHTML = `
<svg viewBox="0 0 24 24" width="18" height="18"
fill="none" stroke="#888" stroke-width="2"
stroke-linecap="round" stroke-linejoin="round">
<path d="M12 20h9"/>
<path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
</svg>`;

edit.onclick=()=>{

const newText = prompt("Edit message:", msg.text);
if(newText !== null){
update(ref(db,"messages/"+id),{
text:newText
});
}
};

right.appendChild(del);
right.appendChild(edit);
}

/* time */
const t = document.createElement("span");
t.className="time";
t.textContent = msg.time;

right.appendChild(t);

div.appendChild(left);
div.appendChild(right);

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
