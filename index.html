<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:"Courier New",monospace;
}

/* messages */
#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:60px;
    overflow-y:auto;
    padding:8px;
    font-size:clamp(14px,4vw,20px);
    color:white;
    white-space:pre-wrap;
}

/* input */
#input{
    position:absolute;
    bottom:0;
    left:0;
    width:65%;
    height:50px;
    border:none;
    outline:none;
    background:black;
    color:#00ff66;
    font-family:"Courier New",monospace;
    font-size:clamp(14px,4vw,20px);
    padding-left:8px;
    caret-color:#00ff66;
}

button{
    position:absolute;
    bottom:0;
    height:50px;
    border:none;
    font-family:"Courier New",monospace;
}

#send{
    right:15%;
    width:15%;
    background:#00aa44;
    color:black;
}

#clear{
    right:0;
    width:15%;
    background:#aa0000;
    color:white;
}

.msg{
    margin-bottom:3px;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off">
<button id="send">SEND</button>
<button id="clear">CLEAR</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, remove }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
    authDomain: "jacob-chat.firebaseapp.com",
    databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jacob-chat",
    storageBucket: "jacob-chat.firebasestorage.app",
    messagingSenderId: "554355410181",
    appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById("input");
const messages = document.getElementById("messages");
const send = document.getElementById("send");
const clear = document.getElementById("clear");

const messagesRef = ref(db,"messages");

/* stable per-tab identity */
let userId = localStorage.getItem("chat_id");
if(!userId){
    userId = Math.random().toString(16).slice(2);
    localStorage.setItem("chat_id", userId);
}

/* stable per-tab color */
let userColor = localStorage.getItem("chat_color");
if(!userColor){
    const colors = ["#00ff66","#66aaff","#ff6666","#ffcc00","#cc66ff","#66ffcc"];
    userColor = colors[Math.floor(Math.random()*colors.length)];
    localStorage.setItem("chat_color", userColor);
}

/* name system */
let username = "anon";

/* always focus input */
function focus(){
    input.focus();
}
window.addEventListener("load",focus);
window.addEventListener("click",focus);
window.addEventListener("keydown",focus);

/* send */
function sendMessage(){

    const text = input.value.trim();
    if(!text) return;

    if(text.startsWith("?name ")){
        username = text.replace("?name ","").trim() || "anon";
        input.value="";
        return;
    }

    push(messagesRef,{
        text,
        name: username,
        color: userColor
    });

    input.value="";
}

input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter") sendMessage();
});

send.addEventListener("click",sendMessage);

clear.addEventListener("click",()=>{
    remove(messagesRef);
    messages.innerHTML="";
});

/* receive messages */
onChildAdded(messagesRef,(data)=>{

    const msg = data.val();

    const name = msg.name || "anon";
    const text = msg.text || "";
    const color = msg.color || "#ffffff";

    const div = document.createElement("div");
    div.className = "msg";

    /* IMPORTANT FIX:
       NO innerHTML, no broken < > */
    div.textContent = `<${name}> ${text}`;

    /* apply colour ONLY to name by splitting safely */
    const namePart = document.createElement("span");
    namePart.style.color = color;
    namePart.textContent = `<${name}>`;

    const textPart = document.createElement("span");
    textPart.textContent = ` ${text}`;

    div.textContent = "";
    div.appendChild(namePart);
    div.appendChild(textPart);

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
});

</script>

</body>
</html>
