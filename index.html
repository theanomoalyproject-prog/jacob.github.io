<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:"Courier New",monospace;
    font-size:20px;
}

#messages{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:40px;
    overflow-y:auto;
    padding:8px;
    color:white;
    white-space:pre-wrap;
}

.msg{
    margin-bottom:2px;
}

#input{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    border:none;
    outline:none;
    background:black;
    color:#00ff66;
    font-family:"Courier New",monospace;
    font-size:20px;
    padding:8px;
}

#input::placeholder{
    color:#00ff66;
}
</style>
</head>

<body>

<div id="messages"></div>

<input id="input" autocomplete="off" placeholder=" ">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
    authDomain: "jacob-chat.firebaseapp.com",
    databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jacob-chat",
    storageBucket: "jacob-chat.firebasestorage.app",
    messagingSenderId: "554355410181",
    appId: "1:554355410181:web:250c29e43f29cfb8b4e36c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const input = document.getElementById("input");
const messages = document.getElementById("messages");
const messagesRef = ref(db,"messages");

input.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        const text = input.value.trim();
        if(!text) return;

        push(messagesRef,{ text });

        input.value="";
    }
});

onChildAdded(messagesRef,(data)=>{

    const msg = data.val();

    const div = document.createElement("div");
    div.className = "msg";
    div.textContent = "<> " + msg.text;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
});

</script>

</body>
</html>
