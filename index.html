<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jacob's Diary</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    overflow: hidden;
    font-family: "Courier New", monospace;
}

#chat {
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    bottom: 35px;
    overflow-y: auto;
    white-space: pre-wrap;
    font-size: 22px;
    line-height: 1.3;
}

.line {
    margin-bottom: 2px;
}

#input {
    position: absolute;
    bottom: 5px;
    left: 8px;
    right: 8px;
    border: none;
    outline: none;
    background: black;
    color: white;
    font-size: 22px;
    font-family: "Courier New", monospace;
}

#input::placeholder {
    color: white;
}
</style>
</head>

<body>

<div id="chat"></div>

<input
id="input"
type="text"
autocomplete="off"
autofocus
placeholder="   "
>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onChildAdded
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBE0_RBvPYFmeJ-tNaM3b75-qGPca4_m3I",
    authDomain: "jacob-chat.firebaseapp.com",
    databaseURL: "https://jacob-chat-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "jacob-chat",
    storageBucket: "jacob-chat.firebasestorage.app",
    messagingSenderId: "554355410181",
    appId: "1:554355410181:web:250c29e43f29cfb8b4e36c",
    measurementId: "G-XWZ8N5219K"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const chat = document.getElementById("chat");

const input = document.getElementById("input");

const messagesRef = ref(db, "messages");

function updateInput() {
    input.placeholder = "   " + input.value;
}

input.addEventListener("input", updateInput);

input.addEventListener("keydown", (e) => {

    if (e.key === "Enter") {

        const text = input.value.trim();

        if (text.length < 1) return;

        push(messagesRef, {
            text: text
        });

        input.value = "";

        updateInput();
    }
});

onChildAdded(messagesRef, (data) => {

    const msg = data.val();

    const div = document.createElement("div");

    div.className = "line";

    div.textContent = "<> " + msg.text;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
});

updateInput();

</script>

</body>
</html>
