<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Call</title>

<style>
html,body{
margin:0;
height:100%;
background:black;
font-family:monospace;
}

#topBar{
position:fixed;
top:0;
left:0;
right:0;
height:50px;
background:#111;
display:flex;
align-items:center;
padding:0 10px;
gap:10px;
box-sizing:border-box;
z-index:10;
}

button{
background:#00aa44;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
font-family:monospace;
}

#call{
position:absolute;
top:50px;
bottom:0;
left:0;
right:0;
}
</style>
</head>

<body>

<div id="topBar">
<button onclick="location.href='index.html'">← BACK</button>
<div style="color:white;">VOICE CALL</div>
</div>

<div id="call"></div>

<script src="https://meet.jit.si/external_api.js"></script>

<script>
const room = location.hash.replace("#","") || "default-room";

const api = new JitsiMeetExternalAPI("meet.jit.si", {
roomName: room,
parentNode: document.getElementById("call"),
width: "100%",
height: "100%",
configOverwrite: {
startWithVideoMuted: true,
startWithAudioMuted: false
},
interfaceConfigOverwrite: {
SHOW_JITSI_WATERMARK: false,
SHOW_WATERMARK_FOR_GUESTS: false
}
});
</script>

</body>
</html>
